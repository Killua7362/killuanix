[project]
name = "code-index-mcp"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0.0",
    "tree-sitter>=0.24.0",
    "tree-sitter-java>=0.23.0",
    "qdrant-client>=1.12.0",
    "httpx>=0.27.0",
]

[project.scripts]
code-index-mcp = "server:main"

[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"
