version: "3.8"

services:
  gp-vpn:
    build: .
    dns:
      - 8.8.8.8
      - 8.8.4.4
    container_name: gp-vpn-browser
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "6080:6080"
      - "1080:1080"
    volumes:
      - /home/killua/Documents/vmvolume/home:/home/vpnuser
      - /home/killua/Documents/Boeing:/home/vpnuser/Boeing
      - ./all-boeing-certs.pem:/usr/local/share/ca-certificates/all-boeing-certs.pem
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped
