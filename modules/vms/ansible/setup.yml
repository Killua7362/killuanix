---
# Work Ubuntu VM provisioning — i3 tiling WM + tools
- hosts: work-ubuntu
  become: true
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Install i3 tiling window manager
      apt:
        name:
          - i3
          - i3blocks
          - i3lock
          - dmenu
          - dunst
          - dex
          - xterm
          - libnotify-bin
          - lightdm
          - lightdm-gtk-greeter
          - adwaita-icon-theme
          - x11-xserver-utils
        state: present

    - name: Set default target to graphical
      command: systemctl set-default graphical.target

    - name: Enable LightDM
      systemd:
        name: lightdm
        enabled: true

    - name: Fix home directory ownership
      shell: chown -R user:user /home/user --exclude=snap 2>/dev/null || find /home/user -not -path "*/snap/*" -exec chown user:user {} + 2>/dev/null || true

    - name: Add user to autologin groups
      shell: |
        groupadd -f autologin
        groupadd -f nopasswdlogin
        usermod -aG autologin,nopasswdlogin user

    - name: Configure LightDM autologin
      copy:
        dest: /etc/lightdm/lightdm.conf
        content: |
          [Seat:*]
          autologin-user=user
          autologin-session=i3
          user-session=i3
        mode: '0644'

    - name: Install useful tools
      apt:
        name:
          - htop
          - curl
          - wget
          - unzip
        state: present

    - name: Add Google Chrome apt key
      shell: curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
      args:
        creates: /usr/share/keyrings/google-chrome.gpg

    - name: Add Google Chrome repository
      copy:
        dest: /etc/apt/sources.list.d/google-chrome.list
        content: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main"
        mode: '0644'

    - name: Install Google Chrome
      apt:
        name: google-chrome-stable
        state: present
        update_cache: true

    - name: Install fonts
      apt:
        name:
          - fonts-noto
          - fonts-noto-color-emoji
          - fonts-dejavu
          - fonts-liberation
          - fonts-freefont-ttf
        state: present

    - name: Install PulseAudio client
      apt:
        name:
          - pulseaudio-utils
        state: present

    - name: Configure PulseAudio to stream to host
      copy:
        dest: /etc/pulse/client.conf.d/00-network.conf
        mode: '0644'
        content: |
          default-server = tcp:192.168.122.1:4713

    - name: Set PULSE_SERVER globally
      lineinfile:
        path: /etc/environment
        line: "PULSE_SERVER=tcp:192.168.122.1:4713"
        state: present
        create: true

    - name: Install Hubstaff dependencies
      apt:
        name:
          - libfuse2
          - libappindicator3-1
          - libnss3
        state: present

    - name: Enable spice-vdagentd
      systemd:
        name: spice-vdagentd
        enabled: true
        state: started
      ignore_errors: true

    - name: Create /mnt/host mount point
      file:
        path: /mnt/host
        state: directory
        mode: '0755'

    - name: Configure virtiofs mount in fstab
      lineinfile:
        path: /etc/fstab
        line: "host-shared /mnt/host virtiofs defaults,nofail 0 0"
        state: present
        create: true

    - name: Mount shared directory
      shell: mountpoint -q /mnt/host || mount /mnt/host
      ignore_errors: true

    - name: Create symlink to shared dir on desktop
      file:
        src: /mnt/host
        dest: /home/user/Desktop/Shared
        state: link
        owner: user
        group: user
      ignore_errors: true

    - name: Install VPN tools
      apt:
        name:
          - openconnect
          - vpnc-scripts
          - network-manager-openconnect
        state: present

    - name: Create i3 config directory
      file:
        path: /home/user/.config/i3
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Configure i3 window manager
      copy:
        dest: /home/user/.config/i3/config
        owner: user
        group: user
        mode: '0644'
        content: |
          # i3 config — Colemak-DH layout
          set $mod Mod4
          floating_modifier $mod
          default_border pixel 2
          default_floating_border pixel 2
          gaps inner 4
          gaps outer 2
          font pango:DejaVu Sans 9

          # ── Colemak-DH navigation (n=left e=down i=up o=right) ──
          bindsym $mod+n focus left
          bindsym $mod+e focus down
          bindsym $mod+i focus up
          bindsym $mod+o focus right
          bindsym $mod+Shift+n move left
          bindsym $mod+Shift+e move down
          bindsym $mod+Shift+i move up
          bindsym $mod+Shift+o move right

          # ── Apps ──
          bindsym $mod+Return exec xterm
          bindsym $mod+b exec google-chrome-stable
          bindsym $mod+d exec --no-startup-id dmenu_run -fn 'DejaVu Sans-10' -nb '#282a36' -nf '#f8f8f2' -sb '#6272a4' -sf '#f8f8f2'
          bindsym $mod+q kill

          # ── Layout ──
          bindsym $mod+f fullscreen toggle
          bindsym $mod+space floating toggle
          bindsym $mod+s layout stacking
          bindsym $mod+t layout tabbed
          bindsym $mod+w layout toggle split
          bindsym $mod+h split h
          bindsym $mod+v split v

          # ── Workspaces ──
          bindsym $mod+1 workspace number 1
          bindsym $mod+2 workspace number 2
          bindsym $mod+3 workspace number 3
          bindsym $mod+4 workspace number 4
          bindsym $mod+5 workspace number 5
          bindsym $mod+6 workspace number 6
          bindsym $mod+Shift+1 move container to workspace number 1
          bindsym $mod+Shift+2 move container to workspace number 2
          bindsym $mod+Shift+3 move container to workspace number 3
          bindsym $mod+Shift+4 move container to workspace number 4
          bindsym $mod+Shift+5 move container to workspace number 5
          bindsym $mod+Shift+6 move container to workspace number 6

          # ── Resize mode (Colemak: n/e/i/o) ──
          mode "resize" {
              bindsym n resize shrink width 5 px or 5 ppt
              bindsym e resize grow height 5 px or 5 ppt
              bindsym i resize shrink height 5 px or 5 ppt
              bindsym o resize grow width 5 px or 5 ppt
              bindsym Return mode "default"
              bindsym Escape mode "default"
          }
          bindsym $mod+r mode "resize"

          # ── i3 control ──
          bindsym $mod+Shift+c reload
          bindsym $mod+Shift+r restart
          bindsym $mod+Shift+x exec i3lock -c 282a36

          # ── Bar ──
          bar {
              status_command i3blocks -c /home/user/.config/i3blocks/config
              position top
              tray_output primary
              colors {
                  background #282a36
                  statusline #f8f8f2
                  separator  #44475a
                  focused_workspace  #6272a4 #6272a4 #f8f8f2
                  active_workspace   #44475a #44475a #f8f8f2
                  inactive_workspace #282a36 #282a36 #888888
                  urgent_workspace   #ff5555 #ff5555 #f8f8f2
              }
          }

          # ── Window colors ──
          client.focused          #6272a4 #6272a4 #f8f8f2 #6272a4 #6272a4
          client.unfocused        #282a36 #282a36 #888888 #282a36 #282a36
          client.focused_inactive #44475a #44475a #f8f8f2 #44475a #44475a
          client.urgent           #ff5555 #ff5555 #f8f8f2 #ff5555 #ff5555

          # ── Autostart ──
          exec --no-startup-id dunst
          exec --no-startup-id xrandr --output Virtual-1 --preferred
          exec --no-startup-id xrdb -merge /home/user/.Xresources
          exec --no-startup-id dex --autostart --environment i3

    - name: Create i3blocks config directory
      file:
        path: /home/user/.config/i3blocks
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Configure i3blocks bar
      copy:
        dest: /home/user/.config/i3blocks/config
        owner: user
        group: user
        mode: '0644'
        content: |
          separator_block_width=20

          [hubstaff]
          command=if [ "$BLOCK_BUTTON" = "1" ]; then /home/user/Hubstaff/HubstaffClient.bin.x86_64 &>/dev/null & fi; echo "HST"
          label=>>
          interval=once
          color=#e5a00d

          [chrome]
          command=if [ "$BLOCK_BUTTON" = "1" ]; then google-chrome-stable &>/dev/null & fi; echo "WWW"
          label=>>
          interval=once
          color=#4285f4

          [terminal]
          command=if [ "$BLOCK_BUTTON" = "1" ]; then xterm &>/dev/null & fi; echo "TERM"
          label=>>
          interval=once
          color=#50fa7b

          [separator]
          full_text=|
          color=#44475a
          separator=false
          separator_block_width=10

          [cpu]
          command=grep 'cpu ' /proc/stat | awk '{usage=($2+$4)*100/($2+$4+$5)} END {printf "CPU %.0f%%\n", usage}'
          interval=5
          color=#f8f8f2

          [memory]
          command=free -h | awk '/Mem:/ {printf "MEM %s/%s\n", $3, $2}'
          interval=5
          color=#f8f8f2

          [time]
          command=date '+%H:%M | %b %d'
          interval=30
          color=#f8f8f2

    - name: Create dunst config directory
      file:
        path: /home/user/.config/dunst
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Configure dunst notifications
      copy:
        dest: /home/user/.config/dunst/dunstrc
        owner: user
        group: user
        mode: '0644'
        content: |
          [global]
          monitor = 0
          follow = mouse
          width = 350
          height = 100
          offset = 10x40
          origin = top-right
          transparency = 0
          frame_color = "#44475a"
          frame_width = 2
          font = DejaVu Sans 10
          format = "<b>%s</b>\n%b"
          icon_position = left
          max_icon_size = 48
          corner_radius = 6
          mouse_left_click = close_current
          mouse_right_click = close_all

          [urgency_low]
          background = "#282a36"
          foreground = "#f8f8f2"
          timeout = 5

          [urgency_normal]
          background = "#282a36"
          foreground = "#f8f8f2"
          timeout = 10

          [urgency_critical]
          background = "#ff5555"
          foreground = "#f8f8f2"
          timeout = 0

    - name: Configure xterm dark theme
      copy:
        dest: /home/user/.Xresources
        owner: user
        group: user
        mode: '0644'
        content: |
          XTerm*background: #282a36
          XTerm*foreground: #f8f8f2
          XTerm*cursorColor: #f8f8f2
          XTerm*faceName: DejaVu Sans Mono
          XTerm*faceSize: 11
          XTerm*selectToClipboard: true
          XTerm*scrollBar: false
          XTerm*saveLines: 10000

    - name: Create GTK-3.0 config directory
      file:
        path: /home/user/.config/gtk-3.0
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Configure GTK dark theme
      copy:
        dest: /home/user/.config/gtk-3.0/settings.ini
        owner: user
        group: user
        mode: '0644'
        content: |
          [Settings]
          gtk-theme-name=Adwaita-dark
          gtk-icon-theme-name=Adwaita
          gtk-font-name=DejaVu Sans 10

    - name: Configure GTK2 dark theme
      copy:
        dest: /home/user/.gtkrc-2.0
        owner: user
        group: user
        mode: '0644'
        content: |
          gtk-theme-name="Adwaita-dark"
          gtk-icon-theme-name="Adwaita"
          gtk-font-name="DejaVu Sans 10"

    - name: Set auto-resize resolution on login
      copy:
        dest: /home/user/.xprofile
        owner: user
        group: user
        mode: '0755'
        content: |
          xrandr --output Virtual-1 --preferred
          xrdb -merge /home/user/.Xresources

    - name: Ensure ~/.local/bin exists
      file:
        path: /home/user/.local/bin
        state: directory
        owner: user
        group: user
        mode: '0755'
        recurse: true

    - name: Install python3-dbus for notification logger
      apt:
        name:
          - python3-dbus
          - python3-gi
          - gir1.2-glib-2.0
        state: present

    - name: Create Hubstaff notification logger script
      copy:
        dest: /home/user/.local/bin/hubstaff-notify-logger.sh
        owner: user
        group: user
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import dbus
          from dbus.mainloop.glib import DBusGMainLoop
          from gi.repository import GLib
          from datetime import datetime

          LOG = "/tmp/hubstaff-notify.log"

          def on_notify(bus, msg):
              args = msg.get_args_list()
              if len(args) < 5:
                  return
              app_name = str(args[0])   # arg 0: app_name
              summary  = str(args[3])   # arg 3: summary
              body     = str(args[4])   # arg 4: body
              # Only log Hubstaff notifications
              if "hubstaff" not in app_name.lower():
                  return
              ts = datetime.now().strftime("%H:%M")
              text = f"{summary}: {body}" if body else summary
              with open(LOG, "a") as f:
                  f.write(f"{ts} {text}\n")

          DBusGMainLoop(set_as_default=True)
          bus = dbus.SessionBus()
          bus.add_match_string(
              "type='method_call',interface='org.freedesktop.Notifications',member='Notify'"
          )
          bus.add_message_filter(on_notify)
          GLib.MainLoop().run()

    - name: Create Hubstaff notification logger autostart
      copy:
        dest: /etc/xdg/autostart/hubstaff-notify-logger.desktop
        mode: '0644'
        content: |
          [Desktop Entry]
          Type=Application
          Name=Hubstaff Notify Logger
          Exec=/home/user/.local/bin/hubstaff-notify-logger.sh
          Hidden=false
          NoDisplay=true
          X-GNOME-Autostart-enabled=true

    - name: Disable systemd-networkd-wait-online (slow boot)
      systemd:
        name: systemd-networkd-wait-online.service
        masked: true

    - name: Reboot to start LightDM with autologin
      reboot:
        msg: "Rebooting to start i3 desktop"
        reboot_timeout: 300

    # Hubstaff: Download to desktop for manual GUI install
    - name: Ensure Desktop directory exists
      file:
        path: /home/user/Desktop
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Download Hubstaff installer to Desktop
      get_url:
        url: https://app.hubstaff.com/download/linux
        dest: /home/user/Desktop/hubstaff-installer.sh
        owner: user
        group: user
        mode: '0755'

    - name: Create Hubstaff autostart entry
      copy:
        dest: /etc/xdg/autostart/hubstaff.desktop
        mode: '0644'
        content: |
          [Desktop Entry]
          Type=Application
          Name=Hubstaff
          Exec=/home/user/Hubstaff/HubstaffClient.bin.x86_64
          Hidden=false
          NoDisplay=true
          X-GNOME-Autostart-enabled=true
          StartupNotify=false
